name: Cue
options:
  bundleIdPrefix: com.san
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_HARDENED_RUNTIME: YES
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Cue:
    type: application
    platform: macOS
    sources:
      - path: Cue
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.san.Cue
        CODE_SIGN_ENTITLEMENTS: Cue/Cue.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Cue
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSHumanReadableCopyright: "Made by santiagoalonso.com"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Cue listens to your voice to auto-scroll the teleprompter and help you rehearse."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Cue transcribes what you read so it can scroll the teleprompter to your exact position in the script."
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
